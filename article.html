<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="article-page-title">Article - PB2I</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script type="module" src="/src/pages/article.js"></script>
  <style>
    /* Permet à l'arrière-plan de la dernière section de toucher le footer sans créer de scrollbar */
    footer {
      margin-top: -60px !important;
    }
  </style>
</head>
<body class="bg-white">
<main id="main-content" class="page-offset">

  <!-- Article Header -->
  <div id="article-header" class="px-4 lg:px-36 pt-12 mx-auto">
    <div class="skeleton h-10 mb-4 rounded-lg max-w-2xl"></div>
    <div class="skeleton h-6 mb-2 rounded-lg max-w-xl"></div>
    <div class="skeleton h-6 rounded-lg max-w-lg"></div>
  </div>

  <!-- Article Body -->
  <div id="article-body" class="px-4 lg:px-36 pb-12">
    <div class="skeleton h-4 mb-3 rounded-lg"></div>
    <div class="skeleton h-4 mb-3 rounded-lg max-w-[90%]"></div>
    <div class="skeleton h-4 mb-8 rounded-lg max-w-[75%]"></div>
    <div class="skeleton h-64 mb-8 rounded-xl"></div>
    <div class="skeleton h-4 mb-3 rounded-lg"></div>
    <div class="skeleton h-4 mb-3 rounded-lg max-w-[85%]"></div>
    <div class="skeleton h-4 rounded-lg max-w-[70%]"></div>
  </div>

  <!-- Related articles -->
  <section class="bg-warm-bg px-4 lg:px-36 pt-12 pb-28">
    <h2 class="text-primary font-heading font-bold text-xl mb-8 uppercase tracking-wide" >
      Autres articles susceptibles de vous plaire…
    </h2>
    <!-- Carousel Wrapper -->
    <div id="articles-carousel" class="relative w-full overflow-hidden py-2">
      <div id="articles-track" class="flex gap-6 transition-transform duration-500 ease-out">
        <div class="skeleton rounded-xl h-80 flex-[0_0_85%] sm:flex-[0_0_calc(50%-12px)] lg:flex-[0_0_calc(25%-18px)] min-w-0"></div>
        <div class="skeleton rounded-xl h-80 flex-[0_0_85%] sm:flex-[0_0_calc(50%-12px)] lg:flex-[0_0_calc(25%-18px)] min-w-0"></div>
        <div class="skeleton rounded-xl h-80 flex-[0_0_85%] sm:flex-[0_0_calc(50%-12px)] lg:flex-[0_0_calc(25%-18px)] min-w-0"></div>
        <div class="skeleton rounded-xl h-80 flex-[0_0_85%] sm:flex-[0_0_calc(50%-12px)] lg:flex-[0_0_calc(25%-18px)] min-w-0"></div>
      </div>
      <div class="flex gap-2 justify-center mt-6" id="articles-dots"></div>
    </div>
  </section>

</main>
</body>
</html>
